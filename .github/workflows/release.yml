name: Release (manual)

# Manual fallback release. Primary release path is via the Changesets workflow.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag to release (e.g. 0.2.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify built files exist
        run: |
          test -f main.js
          test -f manifest.json
          test -f styles.css

      - name: Verify manifest version matches input tag
        run: |
          tag="${{ github.event.inputs.tag }}"
          manifest_version=$(node -p "require('./manifest.json').version")
          if [ "$tag" != "$manifest_version" ]; then
            echo "Input tag $tag does not match manifest.json version $manifest_version"
            exit 1
          fi

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.event.inputs.tag }}" \
            --title "${{ github.event.inputs.tag }}" \
            --generate-notes \
            main.js manifest.json styles.css
